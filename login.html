<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk ke Longview</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 350px;
            text-align: center;
            border: 1px solid #333;
        }
        h2 { margin-bottom: 20px; letter-spacing: 2px; }
        h2 span { color: #ff3e3e; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #ff3e3e;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background: #d32f2f; }
        .toggle-link {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #888;
        }
        .toggle-link span {
            color: #ff3e3e;
            cursor: pointer;
            text-decoration: underline;
        }
        #message { margin-top: 15px; font-size: 0.9rem; color: #ff3e3e; }
    </style>
</head>
<body>

    <div class="container" id="authBox">
        <h2 id="formTitle">LONG<span>VIEW</span> LOGIN</h2>
        <form id="authForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn" id="submitBtn">MASUK</button>
        </form>
        <p id="message"></p>
        <p class="toggle-link" id="toggleText">Belum punya akun? <span onclick="toggleMode()">Daftar di sini</span></p>
    </div>

<script>
    let isLoginMode = true;

    // Fungsi ganti mode (Login <-> Daftar)
    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('formTitle').innerHTML = isLoginMode ? 'LONG<span>VIEW</span> LOGIN' : 'LONG<span>VIEW</span> SIGN UP';
        document.getElementById('submitBtn').innerText = isLoginMode ? 'MASUK' : 'DAFTAR SEKARANG';
        document.getElementById('toggleText').innerHTML = isLoginMode ? 
            'Belum punya akun? <span onclick="toggleMode()">Daftar di sini</span>' : 
            'Sudah punya akun? <span onclick="toggleMode()">Login di sini</span>';
        document.getElementById('message').innerText = '';
    }

    document.getElementById('authForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value.trim(); // Hapus spasi tak sengaja
        const pass = document.getElementById('password').value.trim();
        const message = document.getElementById('message');

        if (!isLoginMode) {
            // MODE DAFTAR
            localStorage.setItem('user_' + user, pass);
            message.style.color = '#4CAF50';
            message.innerText = 'Akun ' + user + ' berhasil dibuat! Silakan Login.';
            toggleMode();
        } else {
            // MODE MASUK
            const storedPass = localStorage.getItem('user_' + user);
            
            // LOGIC PENGECEKAN (Dibuat lebih longgar agar mudah masuk)
            if ((user === 'admin' && pass === '12345') || (storedPass !== null && storedPass === pass)) {
                console.log("Login Sukses!");
                sessionStorage.setItem('akses_longview', 'diizinkan');
                window.location.href = 'index.html';
            } else {
                console.log("Login Gagal. Input:", user, pass);
                message.style.color = '#ff3e3e';
                message.innerText = 'Username atau Password salah!';
            }
        }
    });
</script>
</body>
</html>
