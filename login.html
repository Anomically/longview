<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Longview</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 350px;
            text-align: center;
            border: 1px solid #333;
        }
        .login-box h2 {
            margin-bottom: 10px;
            font-size: 2rem;
            letter-spacing: 2px;
        }
        .login-box h2 span { color: #ff3e3e; }
        .login-box p { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #ff3e3e;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover { background: #d32f2f; }
        #message { color: #ff3e3e; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>LONG<span>VIEW</span></h2>
        <p>Silakan login untuk mengakses portal.</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">MASUK</button>
        </form>
        <p id="message"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const message = document.getElementById('message');

            // --- PENGATURAN USERNAME & PASSWORD ---
            if (user === 'admin' && pass === '12345') {
                // Simpan status sukses di memori browser
                sessionStorage.setItem('akses_longview', 'diizinkan');
                // Arahkan ke halaman utama
                window.location.href = 'index.html'; 
            } else {
                message.textContent = 'Username atau Password salah!';
            }
        });
    </script>
</body>
</html>
